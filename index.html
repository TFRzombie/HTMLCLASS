<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HMSCLASS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#ff0000;--red2:#cc0000;
  --bg:#0f0f0f;--bg2:#181818;--bg3:#212121;--bg4:#272727;--bg5:#3f3f3f;
  --text:#f1f1f1;--text2:#aaaaaa;--text3:#717171;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
  --shadow:0 4px 20px rgba(0,0,0,0.5);
  --r:8px;--r2:24px;
}
body{font-family:'Roboto',Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#555;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;}

/* ── HEADER ── */
.header{background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1000;height:56px;display:flex;align-items:center;}
.header-inner{width:100%;padding:0 16px;display:flex;align-items:center;gap:8px;}
.logo-section{display:flex;align-items:center;gap:4px;cursor:pointer;flex-shrink:0;margin-right:8px;}
.logo-icon{width:32px;height:22px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:14px;height:14px;fill:white;}
.logo-text{font-size:1.15rem;font-weight:700;letter-spacing:-0.5px;color:var(--text);}
.logo-text span{color:var(--text2);font-weight:400;font-size:0.65rem;vertical-align:super;margin-left:1px;}

/* SEARCH BAR */
.search-wrap{flex:1;max-width:640px;display:flex;align-items:center;gap:8px;margin:0 auto;}
.search-form{flex:1;display:flex;position:relative;}
.search-input{flex:1;height:40px;padding:0 16px;background:var(--bg);border:1px solid var(--bg5);border-radius:40px 0 0 40px;color:var(--text);font-size:1rem;outline:none;transition:border-color 0.15s;}
.search-input:focus{border-color:#1c62b9;box-shadow:inset 0 1px 2px rgba(0,0,0,0.3);}
.search-input::placeholder{color:var(--text3);}
.search-btn{height:40px;width:64px;background:var(--bg3);border:1px solid var(--bg5);border-left:none;border-radius:0 40px 40px 0;cursor:pointer;color:var(--text2);font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
.search-btn:hover{background:var(--bg4);}
.voice-btn{width:40px;height:40px;border-radius:50%;background:var(--bg3);border:none;color:var(--text2);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.voice-btn:hover{background:var(--bg4);}

/* HEADER RIGHT */
.header-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0;}
.icon-btn{width:40px;height:40px;border-radius:50%;background:none;border:none;color:var(--text2);font-size:1.15rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
.icon-btn:hover{background:var(--bg3);}
.import-btn{height:36px;padding:0 16px;background:rgba(62,166,255,0.1);border:1px solid #3ea6ff;border-radius:18px;color:#3ea6ff;font-size:0.85rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background 0.15s;}
.import-btn:hover{background:rgba(62,166,255,0.2);}

/* ── FILTER CHIPS (under header) ── */
.chips-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;position:sticky;top:56px;z-index:999;}
.chips-bar::-webkit-scrollbar{display:none;}
.chip{padding:6px 12px;background:var(--text);color:var(--bg);border-radius:var(--r2);font-size:0.85rem;font-weight:500;cursor:pointer;flex-shrink:0;border:none;transition:all 0.15s;}
.chip.outline{background:var(--bg3);color:var(--text);border:1px solid var(--border2);}
.chip.outline:hover{background:var(--bg4);}

/* ── LAYOUT ── */
.page-wrap{display:flex;}
.sidebar{width:240px;flex-shrink:0;padding:12px 0;position:sticky;top:104px;height:calc(100vh - 104px);overflow-y:auto;}
.sidebar-item{display:flex;align-items:center;gap:20px;padding:10px 24px;font-size:0.88rem;cursor:pointer;border-radius:10px;margin:0 8px;transition:background 0.1s;color:var(--text);}
.sidebar-item:hover{background:var(--bg3);}
.sidebar-item.active{background:var(--bg3);font-weight:600;}
.sidebar-item .si-icon{font-size:1.2rem;width:24px;text-align:center;}
.sidebar-divider{height:1px;background:var(--border);margin:12px 16px;}
.sidebar-label{padding:8px 24px 4px;font-size:0.8rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;}

.main{flex:1;min-width:0;padding:20px 24px;}

/* ── VIDEO GRID ── */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-title{font-size:1.05rem;font-weight:600;}
.result-meta{font-size:0.82rem;color:var(--text2);}
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px 12px;}

/* VIDEO CARD */
.vcard{cursor:pointer;border-radius:var(--r);overflow:hidden;}
.vcard-thumb{position:relative;width:100%;aspect-ratio:16/9;background:#1a1a1a;border-radius:var(--r);overflow:hidden;}
.vcard-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:border-radius 0.2s;}
.vcard:hover .vcard-thumb img{border-radius:0;}
.vcard-duration{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,0.88);color:#fff;font-size:0.75rem;font-weight:500;padding:2px 5px;border-radius:4px;letter-spacing:0.02em;}
.vcard-progress{position:absolute;bottom:0;left:0;height:3px;background:var(--red);border-radius:0 2px 2px 0;}
.vcard-info{display:flex;gap:10px;padding:10px 4px 4px;}
.vcard-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg4);flex-shrink:0;font-size:0.8rem;display:flex;align-items:center;justify-content:center;color:var(--text2);}
.vcard-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.vcard-meta{flex:1;min-width:0;}
.vcard-title{font-size:0.92rem;font-weight:500;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--text);margin-bottom:4px;}
.vcard-channel{font-size:0.8rem;color:var(--text2);margin-bottom:2px;}
.vcard-stats{font-size:0.78rem;color:var(--text2);}
.vcard-badge{position:absolute;top:6px;left:6px;background:rgba(0,0,0,0.82);color:#fff;font-size:0.7rem;padding:2px 6px;border-radius:3px;}

/* ── WATCH PAGE ── */
.watch-layout{display:flex;gap:24px;align-items:flex-start;}
.watch-main{flex:1;min-width:0;}
.player-box{width:100%;aspect-ratio:16/9;background:#000;border-radius:var(--r);overflow:hidden;position:relative;}
.player-box iframe{width:100%;height:100%;border:none;display:block;}
.watch-title{font-size:1.15rem;font-weight:600;margin:14px 0 10px;line-height:1.4;}
.watch-meta-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.watch-channel-row{display:flex;align-items:center;gap:10px;}
.watch-avatar{width:40px;height:40px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:0.85rem;color:var(--text2);flex-shrink:0;}
.watch-channel-name{font-size:0.95rem;font-weight:600;}
.watch-subs{font-size:0.8rem;color:var(--text2);}
.watch-actions{display:flex;gap:6px;flex-wrap:wrap;}
.watch-btn{height:36px;padding:0 16px;border-radius:var(--r2);border:none;cursor:pointer;font-size:0.85rem;font-weight:500;display:flex;align-items:center;gap:6px;transition:all 0.15s;}
.watch-btn.solid{background:var(--bg4);color:var(--text);}
.watch-btn.solid:hover{background:var(--bg5);}
.watch-btn.red{background:var(--red);color:#fff;}
.watch-btn.red:hover{background:var(--red2);}
.watch-desc-box{background:var(--bg3);border-radius:var(--r);padding:12px 16px;font-size:0.85rem;color:var(--text2);line-height:1.6;cursor:pointer;transition:background 0.15s;}
.watch-desc-box:hover{background:var(--bg4);}
.watch-desc-box .desc-stats{font-weight:600;color:var(--text);margin-bottom:6px;font-size:0.88rem;}
.watch-desc-text{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.watch-desc-text.expanded{-webkit-line-clamp:unset;}
.fix-btn{font-size:0.78rem;color:var(--text3);background:none;border:none;cursor:pointer;padding:4px 0;display:block;margin-top:8px;}
.fix-btn:hover{color:var(--text2);}

/* UP NEXT */
.up-next{width:402px;flex-shrink:0;}
.up-next-label{font-size:0.9rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.up-next-toggle{font-size:0.8rem;color:var(--text2);background:none;border:none;cursor:pointer;}
.mini-card{display:flex;gap:8px;cursor:pointer;padding:6px 0;border-radius:var(--r);}
.mini-card:hover .mini-thumb{border-radius:0;}
.mini-thumb{width:168px;height:94px;border-radius:var(--r);overflow:hidden;background:#1a1a1a;flex-shrink:0;position:relative;}
.mini-thumb img{width:100%;height:100%;object-fit:cover;transition:border-radius 0.2s;}
.mini-dur{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,0.88);color:#fff;font-size:0.72rem;padding:1px 4px;border-radius:3px;}
.mini-info{flex:1;min-width:0;padding:2px 0;}
.mini-title{font-size:0.85rem;font-weight:500;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--text);margin-bottom:4px;}
.mini-channel{font-size:0.78rem;color:var(--text2);}
.mini-stats{font-size:0.75rem;color:var(--text2);}

/* LOADING */
.spinner-wrap{text-align:center;padding:60px 0;}
.spinner{width:36px;height:36px;border:3px solid var(--bg4);border-top:3px solid var(--red);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
.spinner-text{color:var(--text2);font-size:0.88rem;}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOAD MORE */
.load-more-wrap{text-align:center;margin-top:28px;}
.load-more-btn{padding:10px 28px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:var(--r2);cursor:pointer;font-size:0.88rem;font-weight:500;transition:background 0.15s;}
.load-more-btn:hover{background:var(--bg4);}

/* RECENT DROPDOWN */
.recent-drop{display:none;position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:0 0 var(--r) var(--r);z-index:1100;flex-direction:column;box-shadow:var(--shadow);}
.recent-drop.open{display:flex;}
.recent-item{padding:9px 16px;cursor:pointer;font-size:0.9rem;color:var(--text);display:flex;align-items:center;gap:10px;}
.recent-item:hover{background:var(--bg3);}

/* IMPORT MODAL */
.import-modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:3000;backdrop-filter:blur(6px);}
.import-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:28px;max-width:480px;width:92%;box-shadow:var(--shadow);}
.import-box h3{font-size:1.1rem;font-weight:600;margin-bottom:8px;}
.import-box p{font-size:0.85rem;color:var(--text2);margin-bottom:18px;line-height:1.5;}
.import-input{width:100%;height:42px;padding:0 14px;background:var(--bg);border:1px solid var(--bg5);border-radius:var(--r);color:var(--text);font-size:0.95rem;outline:none;margin-bottom:14px;}
.import-input:focus{border-color:#1c62b9;}
.import-actions{display:flex;gap:10px;justify-content:flex-end;}
.import-cancel{padding:8px 20px;background:none;border:1px solid var(--border2);border-radius:var(--r2);color:var(--text2);cursor:pointer;font-size:0.88rem;}
.import-go{padding:8px 20px;background:var(--red);border:none;border-radius:var(--r2);color:#fff;cursor:pointer;font-size:0.88rem;font-weight:600;}

@media(max-width:900px){
  .sidebar{display:none;}
  .watch-layout{flex-direction:column;}
  .up-next{width:100%;}
  .video-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));}
  .mini-thumb{width:130px;height:73px;}
}
@media(max-width:600px){
  .header-inner{gap:4px;}
  .search-wrap{max-width:none;}
  .logo-text{display:none;}
  .chips-bar{top:56px;}
  .main{padding:14px 10px;}
  .video-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- Import Modal -->
<div id="importModal" class="import-modal" style="display:none;" onclick="if(event.target===this)closeImport()">
  <div class="import-box">
    <h3>📋 Import YouTube URL</h3>
    <p>Paste any YouTube video or playlist URL. It'll play through the privacy-enhanced embed — no cookies, no tracking.</p>
    <input class="import-input" id="importInput" placeholder="https://youtube.com/watch?v=..." onkeypress="if(event.key==='Enter')doImport()"/>
    <div class="import-actions">
      <button class="import-cancel" onclick="closeImport()">Cancel</button>
      <button class="import-go" onclick="doImport()">Watch →</button>
    </div>
  </div>
</div>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <!-- Logo -->
    <div class="logo-section" onclick="goHome()">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M10 15.5l6-3.5-6-3.5v7z"/><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" opacity=".1"/></svg>
      </div>
      <span class="logo-text">HMSCLASS<span>β</span></span>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <div class="search-form" style="position:relative;">
        <input class="search-input" id="searchInput" type="text"
          placeholder="Search"
          onkeypress="if(event.key==='Enter')triggerSearch()"
          onfocus="showRecent()"
          onblur="hideRecent()"/>
        <div id="recentDrop" class="recent-drop"></div>
      </div>
      <button class="search-btn" onclick="triggerSearch()">🔍</button>
      <button class="voice-btn" title="Search by topic">🎤</button>
    </div>

    <!-- Right -->
    <div class="header-right">
      <button class="icon-btn" onclick="showImport()" title="Import URL">➕</button>
      <button class="import-btn" onclick="showImport()">➕ <span>Import URL</span></button>
    </div>
  </div>
</header>

<!-- Filter Chips -->
<div class="chips-bar" id="chipsBar">
  <button class="chip" onclick="chipSelect(this,'')">All</button>
  <button class="chip outline" onclick="chipSelect(this,'trending')">Trending</button>
  <button class="chip outline" onclick="chipSelect(this,'gaming')">Gaming</button>
  <button class="chip outline" onclick="chipSelect(this,'music')">Music</button>
  <button class="chip outline" onclick="chipSelect(this,'sports')">Sports</button>
  <button class="chip outline" onclick="chipSelect(this,'news')">News</button>
  <button class="chip outline" onclick="chipSelect(this,'technology')">Technology</button>
  <button class="chip outline" onclick="chipSelect(this,'cooking')">Cooking</button>
  <button class="chip outline" onclick="chipSelect(this,'science')">Science</button>
  <button class="chip outline" onclick="chipSelect(this,'comedy')">Comedy</button>
  <button class="chip outline" onclick="chipSelect(this,'films')">Films</button>
  <button class="chip outline" onclick="chipSelect(this,'anime')">Anime</button>
</div>

<!-- Page Wrap -->
<div class="page-wrap">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-item active" onclick="goHome()"><span class="si-icon">🏠</span> Home</div>
    <div class="sidebar-item" onclick="loadTrending()"><span class="si-icon">🔥</span> Trending</div>
    <div class="sidebar-item" onclick="chipSelect(null,'music')"><span class="si-icon">🎵</span> Music</div>
    <div class="sidebar-item" onclick="chipSelect(null,'gaming')"><span class="si-icon">🎮</span> Gaming</div>
    <div class="sidebar-item" onclick="chipSelect(null,'sports')"><span class="si-icon">⚽</span> Sports</div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-label">More from HMSCLASS</div>
    <div class="sidebar-item" onclick="showImport()"><span class="si-icon">➕</span> Import URL</div>
  </aside>

  <!-- Main -->
  <main class="main" id="mainArea">
    <div class="spinner-wrap" id="homeSpinner"><div class="spinner"></div><p class="spinner-text">Loading...</p></div>
    <div id="gridSection" style="display:none;">
      <div class="section-head"><div class="section-title" id="gridTitle"></div><div class="result-meta" id="gridMeta"></div></div>
      <div class="video-grid" id="videoGrid"></div>
      <div class="load-more-wrap" id="loadMoreWrap" style="display:none;">
        <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()">Load more</button>
      </div>
    </div>
    <div id="watchSection" style="display:none;"></div>
  </main>
</div>

<script>
const API_KEYS=[
  "AIzaSyB0asSfppFrdLhe6v4LRkpilHvOTzZ9sF4",
  "AIzaSyCBieFCuVzGBb3HFzEpvkMO8OeEGjEX7p0",
  "AIzaSyAGi7dFGAaOyR7MifSM3nORr7M0xJkmLyw"
];
let _ki=0;
const gak=()=>API_KEYS[_ki%API_KEYS.length];
const nextKey=()=>{_ki++;return gak();};

let curQuery="",curType="video",curSort="relevance",curPage="",curTotalHits=0;
let curVideoId="",curVideoTitle="",curVideoDesc="",curChannelTitle="";
let recentSearches=JSON.parse(localStorage.getItem("hms_yt_recent")||"[]");
let relatedVids=[],descExpanded=false;
let activeChip=null;

// ── INIT ──
window.onload=()=>loadTrending();

// ── HELPERS ──
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const fmtViews=n=>{n=parseInt(n||0);if(n>=1e9)return(n/1e9).toFixed(1)+"B";if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(0)+"K";return n;};
const fmtDate=d=>{if(!d)return"";const dt=new Date(d);const now=new Date();const diff=Math.floor((now-dt)/1000);if(diff<60)return"Just now";if(diff<3600)return Math.floor(diff/60)+" min ago";if(diff<86400)return Math.floor(diff/3600)+" hours ago";if(diff<604800)return Math.floor(diff/86400)+" days ago";if(diff<2592000)return Math.floor(diff/604800)+" weeks ago";if(diff<31536000)return Math.floor(diff/2592000)+" months ago";return Math.floor(diff/31536000)+" years ago";};
const parseDur=iso=>{const m=iso?.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);if(!m)return"";const h=+m[1]||0,mn=+m[2]||0,s=+m[3]||0;return h?`${h}:${String(mn).padStart(2,"0")}:${String(s).padStart(2,"0")}`:`${mn}:${String(s).padStart(2,"0")}`;};
const initials=name=>name?name.split(/\s+/).map(w=>w[0]).join("").slice(0,2).toUpperCase():"?";

async function fetchJSON(url){
  const r=await fetch(url);
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d;
}

function showSpinner(){
  document.getElementById("homeSpinner").style.display="block";
  document.getElementById("gridSection").style.display="none";
  document.getElementById("watchSection").style.display="none";
}
function showGrid(){
  document.getElementById("homeSpinner").style.display="none";
  document.getElementById("gridSection").style.display="block";
  document.getElementById("watchSection").style.display="none";
}
function showWatch(){
  document.getElementById("homeSpinner").style.display="none";
  document.getElementById("gridSection").style.display="none";
  document.getElementById("watchSection").style.display="block";
}

// ── TRENDING (home) ──
async function loadTrending(categoryId=""){
  showSpinner();
  setSidebarActive(0);
  try{
    let url=`https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails,statistics,status&chart=mostPopular&maxResults=24&regionCode=US&key=${gak()}`;
    if(categoryId)url+=`&videoCategoryId=${categoryId}`;
    const data=await fetchJSON(url);
    const items=data.items.filter(v=>v.status?.embeddable!==false);
    curPage="";
    renderGrid(items,"trending",true,"🔥 Trending",`${items.length} videos`);
  }catch(e){nextKey();showGridError("Failed to load. Retrying...");setTimeout(loadTrending,1000);}
}

// ── CHIP SELECT ──
async function chipSelect(el,topic){
  document.querySelectorAll(".chip").forEach(c=>{c.className="chip outline";});
  if(el){el.className="chip";activeChip=el;}
  if(!topic){loadTrending();return;}
  if(topic==="trending"){loadTrending();return;}
  showSpinner();
  try{
    const url=`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(topic)}&type=video&maxResults=24&order=relevance&videoEmbeddable=true&key=${gak()}`;
    const data=await fetchJSON(url);
    curPage=data.nextPageToken||"";
    curQuery=topic; curType="video"; curSort="relevance";
    renderGrid(data.items,"search",true,topic,"");
  }catch(e){nextKey();showGridError("Failed to load category.");}
}

// ── SEARCH ──
function triggerSearch(){
  const q=document.getElementById("searchInput").value.trim();
  if(!q)return;
  saveRecent(q);
  curQuery=q; curType="video"; curSort="relevance"; curPage="";
  performSearch(true);
}

async function performSearch(clear=true){
  showSpinner();
  if(clear){document.getElementById("videoGrid").innerHTML="";curPage="";}
  try{
    let url=`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(curQuery)}&type=video&maxResults=20&order=${curSort}&videoEmbeddable=true&key=${gak()}`;
    if(curPage)url+=`&pageToken=${curPage}`;
    const data=await fetchJSON(url);
    const nextTok=data.nextPageToken||"";
    const total=data.pageInfo?.totalResults||0;
    curPage=nextTok;
    renderGrid(data.items,"search",clear,`Results for "${curQuery}"`,total?`About ${total.toLocaleString()} results`:"");
    document.getElementById("loadMoreWrap").style.display=nextTok?"block":"none";
  }catch(e){nextKey();showGridError("Search failed: "+e.message);}
}

async function loadMore(){
  document.getElementById("loadMoreBtn").textContent="Loading...";
  await performSearch(false);
  document.getElementById("loadMoreBtn").textContent="Load more";
}

// ── RENDER GRID ──
function renderGrid(items,mode,clear,title,meta){
  const grid=document.getElementById("videoGrid");
  if(clear)grid.innerHTML="";
  document.getElementById("gridTitle").textContent=title||"";
  document.getElementById("gridMeta").textContent=meta||"";
  items.forEach((item,i)=>{
    const isTrending=mode==="trending";
    const id=isTrending?item.id:item.id?.videoId;
    if(!id)return;
    const sn=item.snippet||{};
    const title=sn.title||"";
    const channel=sn.channelTitle||"";
    const thumb=sn.thumbnails?.medium?.url||sn.thumbnails?.default?.url||"";
    const date=sn.publishedAt||"";
    const dur=parseDur(item.contentDetails?.duration||"");
    const views=item.statistics?.viewCount||"";
    const card=document.createElement("div");
    card.className="vcard";
    card.innerHTML=`
      <div class="vcard-thumb">
        <img src="${esc(thumb)}" alt="" loading="lazy"/>
        ${dur?`<div class="vcard-duration">${dur}</div>`:""}
        ${isTrending&&i<10?`<div class="vcard-badge">#${i+1}</div>`:""}
      </div>
      <div class="vcard-info">
        <div class="vcard-avatar">${initials(channel)}</div>
        <div class="vcard-meta">
          <div class="vcard-title">${esc(title)}</div>
          <div class="vcard-channel">${esc(channel)}</div>
          <div class="vcard-stats">${views?fmtViews(views)+" views · ":""}${fmtDate(date)}</div>
        </div>
      </div>`;
    card.onclick=()=>openWatch(id,title,channel,item);
    grid.appendChild(card);
  });
  showGrid();
}

// ── WATCH PAGE ──
async function openWatch(id,title,channel,itemData){
  curVideoId=id; curVideoTitle=title; curChannelTitle=channel;
  curVideoDesc=itemData?.snippet?.description||"";
  descExpanded=false;
  showSpinner();
  window.scrollTo(0,0);

  // Fetch related videos
  let related=[];
  try{
    const r=await fetchJSON(`https://www.googleapis.com/youtube/v3/search?part=snippet&relatedToVideoId=${id}&type=video&maxResults=15&videoEmbeddable=true&key=${gak()}`);
    related=r.items||[];
  }catch(e){
    try{
      const r=await fetchJSON(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(title.split(" ").slice(0,4).join(" "))}&type=video&maxResults=15&videoEmbeddable=true&key=${nextKey()}`);
      related=r.items||[];
    }catch(e2){}
  }

  const stats=itemData?.statistics||{};
  const views=stats.viewCount?fmtViews(stats.viewCount)+" views":"";
  const likes=stats.likeCount?fmtViews(stats.likeCount)+" likes":"";
  const pubDate=itemData?.snippet?.publishedAt?new Date(itemData.snippet.publishedAt).toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"}):"";

  const relatedHTML=related.map(v=>{
    const vid=v.id?.videoId||"";
    if(!vid)return"";
    const sn=v.snippet||{};
    const t=sn.title||"";
    const ch=sn.channelTitle||"";
    const th=sn.thumbnails?.medium?.url||"";
    const dt=sn.publishedAt||"";
    return`<div class="mini-card" onclick="openWatch('${esc(vid)}','${esc(t).replace(/'/g,"\\'")}','${esc(ch).replace(/'/g,"\\'")}',{snippet:${JSON.stringify({title:t,channelTitle:ch,publishedAt:dt,description:''}).replace(/</g,'\\u003c')}})">
      <div class="mini-thumb"><img src="${esc(th)}" alt="" loading="lazy"/></div>
      <div class="mini-info">
        <div class="mini-title">${esc(t)}</div>
        <div class="mini-channel">${esc(ch)}</div>
        <div class="mini-stats">${fmtDate(dt)}</div>
      </div>
    </div>`;
  }).join("");

  document.getElementById("watchSection").innerHTML=`
    <div class="watch-layout">
      <div class="watch-main">
        <div class="player-box">
          <iframe id="watchIframe"
            src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0&modestbranding=1"
            allowfullscreen
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
          </iframe>
        </div>
        <div class="watch-title">${esc(title)}</div>
        <div class="watch-meta-row">
          <div class="watch-channel-row">
            <div class="watch-avatar">${initials(channel)}</div>
            <div>
              <div class="watch-channel-name">${esc(channel)}</div>
              ${views?`<div class="watch-subs">${views}</div>`:""}
            </div>
          </div>
          <div class="watch-actions">
            ${likes?`<button class="watch-btn solid">👍 ${likes}</button>`:""}
            <button class="watch-btn solid" onclick="copyEmbedUrl()">🔗 Share</button>
            <button class="watch-btn solid" onclick="showImport()">📋 Import</button>
          </div>
        </div>
        <div class="watch-desc-box" onclick="toggleDesc()">
          <div class="desc-stats">${[views,pubDate].filter(Boolean).join(" · ")}</div>
          <div class="watch-desc-text" id="watchDescText">${esc(curVideoDesc).replace(/\n/g,"<br/>")}</div>
          <span style="font-size:0.82rem;font-weight:600;color:var(--text);display:block;margin-top:6px;" id="descToggleLabel">Show more</span>
        </div>
        <button class="fix-btn" onclick="fixPlayer()">Video not playing? Click to fix</button>
      </div>
      <aside class="up-next">
        <div class="up-next-label">Up next</div>
        ${relatedHTML||`<p style="font-size:0.85rem;color:var(--text2);">No related videos found.</p>`}
      </aside>
    </div>`;
  showWatch();
}

function toggleDesc(){
  descExpanded=!descExpanded;
  document.getElementById("watchDescText").classList.toggle("expanded",descExpanded);
  document.getElementById("descToggleLabel").textContent=descExpanded?"Show less":"Show more";
}

function fixPlayer(){
  const iframe=document.getElementById("watchIframe");
  if(iframe) iframe.src=`https://www.youtube-nocookie.com/embed/${curVideoId}?autoplay=1&rel=0&vq=hd720`;
}

function copyEmbedUrl(){
  const url=`https://www.youtube-nocookie.com/embed/${curVideoId}`;
  navigator.clipboard.writeText(url).then(()=>{
    alert("Embed URL copied!");
  }).catch(()=>{
    prompt("Copy this URL:",url);
  });
}

// ── IMPORT ──
function showImport(){document.getElementById("importModal").style.display="flex";document.getElementById("importInput").focus();}
function closeImport(){document.getElementById("importModal").style.display="none";document.getElementById("importInput").value="";}
function doImport(){
  const val=document.getElementById("importInput").value.trim();
  if(!val)return;
  const vid=val.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  const pid=val.match(/[?&]list=([a-zA-Z0-9_-]+)/);
  if(vid){
    closeImport();
    openWatch(vid[1],"Imported Video","YouTube",{});
  } else if(pid){
    closeImport();
    alert("Playlist import: Paste the playlist URL on YouTube directly. For now importing first video.");
  } else if(/^[a-zA-Z0-9_-]{11}$/.test(val)){
    closeImport();
    openWatch(val,"Imported Video","YouTube",{});
  } else {
    alert("Couldn't find a YouTube video ID in that URL.");
  }
}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeImport();});

// ── RECENT SEARCHES ──
function saveRecent(q){recentSearches=[q,...recentSearches.filter(s=>s!==q)].slice(0,8);localStorage.setItem("hms_yt_recent",JSON.stringify(recentSearches));}
function showRecent(){
  const el=document.getElementById("recentDrop");
  if(!recentSearches.length)return;
  el.innerHTML=recentSearches.map(s=>`<div class="recent-item" onmousedown="pickRecent('${esc(s)}')">🕒 ${esc(s)}</div>`).join("");
  el.classList.add("open");
}
function hideRecent(){setTimeout(()=>document.getElementById("recentDrop").classList.remove("open"),200);}
function pickRecent(q){document.getElementById("searchInput").value=q;curQuery=q;curType="video";curSort="relevance";curPage="";saveRecent(q);performSearch(true);}

// ── NAV ──
function goHome(){
  document.getElementById("searchInput").value="";
  document.querySelectorAll(".chip").forEach((c,i)=>{c.className=i===0?"chip":"chip outline";});
  loadTrending();
}

function setSidebarActive(idx){
  document.querySelectorAll(".sidebar-item").forEach((el,i)=>{
    el.classList.toggle("active",i===idx);
  });
}

// ── ERRORS ──
function showGridError(msg){
  document.getElementById("videoGrid").innerHTML=`<p style="grid-column:1/-1;color:#f87171;padding:2rem;text-align:center;">${esc(msg)}</p>`;
  showGrid();
}

// Settings popup close on outside click
document.addEventListener("click",e=>{
  const popup=document.getElementById("searchSettingsPopup");
  if(popup&&!popup.contains(e.target))popup.classList.remove("open");
});
</script>
